<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#0EA5E9" /> <!-- Light Blue -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" /> <!-- Emerald -->
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4F46E5" flood-opacity="0.3" />
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Modern App Icon Base -->
  <rect width="200" height="200" rx="48" fill="url(#mainGrad)" filter="url(#glow)"/>

  <!-- Academic Cap (Top) -->
  <path d="M100 45 L155 75 L100 105 L45 75 Z" fill="#FFFFFF" filter="url(#softShadow)"/>
  
  <!-- Digital Central Pillar -->
  <rect x="90" y="105" width="20" height="40" rx="10" fill="url(#accentGrad)" />
  
  <!-- "e" / Smile / Network Connection Arch -->
  <path d="M60 115 A 50 50 0 0 0 140 115" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#softShadow)"/>
  
  <!-- Connection Dot -->
  <circle cx="140" cy="115" r="14" fill="url(#accentGrad)" filter="url(#softShadow)"/>
</svg>
